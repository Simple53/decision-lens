<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Outer Lens Ring Gradient -->
    <linearGradient id="lensRingGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="50%" stop-color="#818cf8" />
      <stop offset="100%" stop-color="#c084fc" />
    </linearGradient>

    <!-- Core Focal Beam Gradient -->
    <linearGradient id="beamGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0.2" />
    </linearGradient>

    <!-- Aperture Prism Accent -->
    <linearGradient id="prismGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="subtleGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Transparent Background Container -->

  <!-- Outer Precision Lens Ring -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="url(#lensRingGrad)" stroke-width="20" filter="url(#subtleGlow)" />
  
  <!-- Inner Aperture Ring -->
  <circle cx="256" cy="256" r="140" fill="none" stroke="#38bdf8" stroke-width="6" stroke-dasharray="16 12" opacity="0.6" />

  <!-- Focal Beam / Lens Cross Sections (Flat Geometry) -->
  <path d="M 256 96 L 396 256 L 256 416 L 116 256 Z" fill="none" stroke="url(#prismGrad)" stroke-width="12" stroke-linejoin="round" />
  
  <!-- Center Focus Core / Decision Point -->
  <circle cx="256" cy="256" r="44" fill="url(#lensRingGrad)" />
  <circle cx="256" cy="256" r="20" fill="#ffffff" />

  <!-- Analytical Grid Lines -->
  <line x1="96" y1="256" x2="416" y2="256" stroke="#ffffff" stroke-width="4" opacity="0.4" stroke-dasharray="8 8" />
  <line x1="256" y1="96" x2="256" y2="416" stroke="#ffffff" stroke-width="4" opacity="0.4" stroke-dasharray="8 8" />
</svg>
